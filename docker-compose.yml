version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    image: rag-app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - qdrant
    ports:
      - "8000:8000"

  pipeline:
    image: rag-app
    command: python -m pipeline.orchestrator
    env_file:
      - .env
    depends_on:
      - qdrant

volumes:
  qdrant_data: